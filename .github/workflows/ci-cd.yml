name: CI/CD Pipeline Flask App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Checar estilo do código
      run: flake8

    - name: Rodar testes
      run: PYTHONPATH=. pytest

    # Configura o Buildx no runner
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Faz o build da imagem
    - name: Build Docker image
      run: docker buildx build . -t flask-app --load

    # Roda o container
    - name: Run Docker container (exemplo)
      run: docker run -d -p 5000:5000 flask-app